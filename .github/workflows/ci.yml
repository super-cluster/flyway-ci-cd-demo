name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    # No need to configure a separate services section for Postgres here 
    # because our integration tests use Testcontainers, which will spin up
    # its own Docker container during the 'mvn test' phase.

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test
      run: mvn -B clean verify
      
    - name: Build Docker Image
      run: mvn spring-boot:build-image -Dspring-boot.build-image.imageName=yours/flyway-demo:latest

  deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    
    # Notice we NO LONGER have a 'services:' block spinning up a local mock database.
    # The GitHub Runner will now reach out over the public internet to connect
    # to your actual Production database hosted in AWS, Azure, etc.

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Production Database Migration
      # Best Practice: NEVER hardcode IPs or passwords!
      # We pull these from GitHub Secrets.
      run: >
        mvn flyway:migrate 
        -Dflyway.url=jdbc:postgresql://${{ secrets.PROD_DB_HOST }}:${{ secrets.PROD_DB_PORT }}/${{ secrets.PROD_DB_NAME }}
        -Dflyway.user=${{ secrets.PROD_DB_USER }}
        -Dflyway.password=${{ secrets.PROD_DB_PASSWORD }}
        -Dflyway.locations=classpath:db/migration

    - name: Trigger Real Production Deployment
      # After the database is successfully upgraded, we tell our cluster to deploy the new code.
      # This simulates hitting a webhook or using SSH to trigger a kubernetes rollout.
      run: |
        echo "Contacting deployment orchestrator at https://deploy.mycompany.com..."
        # Simulate: curl -X POST -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" https://deploy.mycompany.com/webhook
        echo "Successfully instructed cluster to pull and deploy the new flyway-demo:latest image!"
